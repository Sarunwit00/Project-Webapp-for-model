<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>ผู้ดูแล — คำที่เสนอเข้ามา</title>
<link rel="stylesheet" href="style.css?v=9" />
<style>
  [hidden] { display: none !important; }
  .container { max-width: 1100px; }
  .page-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .user-box { display:flex; align-items:center; gap:12px; }
  .user-box .uname { font-size:14px; color:#5f6368; font-weight:600; }
  .warn-banner { background:#fff8e1; border-left:4px solid #f9ab00; padding:10px 14px; border-radius:6px; color:#7a5b00; font-size:13px; margin-bottom:16px; }
  .login-panel { max-width:360px; margin:40px auto; background:#fafbfd; border:1px solid #e3e8ee; border-radius:12px; padding:28px; }
  .login-panel h2 { margin:0 0 18px; font-size:20px; color:#34495e; }
  .login-panel input { width:100%; padding:11px 12px; margin-bottom:12px; border:1px solid #dadce0; border-radius:8px; font-size:15px; font-family:inherit; }
  .login-panel input:focus { outline:none; border-color:#1a73e8; box-shadow:0 0 0 3px rgba(26,115,232,0.15); }
  .login-panel .btn { width:100%; justify-content:center; }
  .login-err { color:#d93025; font-size:14px; margin:10px 0 0; }
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .metric { background:#f1f3f4; border-radius:10px; padding:14px 16px; }
  .metric .label { font-size:13px; color:#5f6368; }
  .metric .value { font-size:26px; font-weight:700; color:#202124; }
  .admin-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px; }
  .admin-bar .spacer { margin-left:auto; }
  .filter-btn { padding:8px 16px; border-radius:999px; border:1px solid #dadce0; background:#fff; cursor:pointer; font-family:inherit; font-size:14px; color:#3c4043; }
  .filter-btn.active { background:#1a73e8; color:#fff; border-color:#1a73e8; }
  .table-wrap { overflow-x:auto; }
  table.admin { width:100%; border-collapse:collapse; font-size:14px; }
  table.admin th, table.admin td { padding:10px; border-bottom:1px solid #e3e8ee; text-align:left; vertical-align:top; }
  table.admin th { background:#f8f9fb; font-weight:600; color:#34495e; white-space:nowrap; }
  table.admin audio { width:190px; height:34px; }
  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap; }
  .pill.pending { background:#fff8e1; color:#9a6700; }
  .pill.approved { background:#e6f4ea; color:#137333; }
  .pill.rejected { background:#fce8e6; color:#c5221f; }
  .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .mini-btn { padding:6px 10px; border-radius:8px; border:1px solid #dadce0; background:#fff; cursor:pointer; font-family:inherit; font-size:13px; }
  .mini-btn.approve { color:#137333; border-color:#a8d5b5; }
  .mini-btn.reject { color:#9a6700; border-color:#f5d98a; }
  .mini-btn.del { color:#c5221f; border-color:#f3b6b1; }
  .mini-btn:hover { background:#f8f9fb; }
  .time { white-space:nowrap; color:#5f6368; font-size:13px; }
  .empty { text-align:center; color:#5f6368; padding:30px; }
</style>
</head>
<body>
  <div class="container">
    <div class="page-head">
      <h1>🛠️ ผู้ดูแล — คำที่เสนอเข้ามา</h1>
      <div id="userBox" class="user-box" hidden>
        <span class="uname" id="userName"></span>
        <button id="logoutBtn" class="btn btn-clear">🚪 ออกจากระบบ</button>
      </div>
    </div>

    <div id="loginPanel" class="login-panel" hidden>
      <h2>🔐 เข้าสู่ระบบผู้ดูแล</h2>
      <input id="loginUser" type="text" placeholder="ชื่อผู้ใช้" autocomplete="username" />
      <input id="loginPass" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />
      <button id="loginBtn" class="btn btn-primary">เข้าสู่ระบบ</button>
      <p id="loginErr" class="login-err" hidden></p>
    </div>

    <div id="adminContent" hidden>
      <div class="warn-banner">⚠️ หน้านี้ลบข้อมูลได้ — อย่าแชร์ชื่อผู้ใช้/รหัสผ่านให้คนอื่น</div>

      <div class="metrics">
        <div class="metric"><div class="label">ทั้งหมด</div><div class="value" id="mTotal">–</div></div>
        <div class="metric"><div class="label">รออนุมัติ</div><div class="value" id="mPending">–</div></div>
        <div class="metric"><div class="label">อนุมัติแล้ว</div><div class="value" id="mApproved">–</div></div>
        <div class="metric"><div class="label">ปฏิเสธ</div><div class="value" id="mRejected">–</div></div>
      </div>

      <div class="admin-bar">
        <button class="filter-btn active" data-status="">ทั้งหมด</button>
        <button class="filter-btn" data-status="pending">รออนุมัติ</button>
        <button class="filter-btn" data-status="approved">อนุมัติแล้ว</button>
        <button class="filter-btn" data-status="rejected">ปฏิเสธ</button>
        <span class="spacer"></span>
        <button class="filter-btn" id="refreshBtn">🔄 รีเฟรช</button>
        <a class="btn btn-secondary" id="csvLink" href="#">⬇️ ดาวน์โหลด CSV</a>
        <a class="btn btn-clear" href="index.html">← กลับหน้าหลัก</a>
      </div>

      <div id="status" class="status"></div>

      <div class="table-wrap">
        <table class="admin">
          <thead>
            <tr>
              <th>#</th><th>ประโยคภาษาถิ่น</th><th>คำแปลไทยกลาง</th><th>หมวด</th>
              <th>ภาค/จังหวัด</th><th>เสียง</th><th>สถานะ</th><th>เวลา</th><th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="empty" class="empty" hidden>— ยังไม่มีรายการ —</div>
    </div>
  </div>

<script>
(function () {
  const API_BASE = (location.protocol === 'file:' || location.port === '5500') ? 'http://127.0.0.1:8000' : '';
  let currentStatus = '';

  const loginPanel = document.getElementById('loginPanel');
  const adminContent = document.getElementById('adminContent');
  const loginUser = document.getElementById('loginUser');
  const loginPass = document.getElementById('loginPass');
  const loginErr = document.getElementById('loginErr');
  const tbody = document.getElementById('tbody');
  const emptyEl = document.getElementById('empty');
  const statusEl = document.getElementById('status');
  const csvLink = document.getElementById('csvLink');
  const userBox = document.getElementById('userBox');
  const userName = document.getElementById('userName');

  const STATUS_LABEL = { pending: 'รออนุมัติ', approved: 'อนุมัติแล้ว', rejected: 'ปฏิเสธ' };

  function setStatusMsg(m) { statusEl.textContent = m || ''; }
  function token() { return localStorage.getItem('adminToken') || ''; }
  function showLogin() { loginPanel.hidden = false; adminContent.hidden = true; userBox.hidden = true; }
  function showContent() {
    loginPanel.hidden = true;
    adminContent.hidden = false;
    userBox.hidden = false;
    userName.textContent = '👤 ' + (localStorage.getItem('adminUser') || '');
  }

  async function authFetch(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers || {}, { 'X-Admin-Token': token() });
    const res = await fetch(url, opts);
    if (res.status === 401) {
      localStorage.removeItem('adminToken');
      showLogin();
      throw new Error('unauthorized');
    }
    return res;
  }

  async function doLogin() {
    loginErr.hidden = true;
    const fd = new FormData();
    fd.append('username', loginUser.value.trim());
    fd.append('password', loginPass.value);
    try {
      const res = await fetch(API_BASE + '/admin/login', { method: 'POST', body: fd });
      if (res.status === 401) {
        loginErr.textContent = '❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
        loginErr.hidden = false;
        return;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', loginUser.value.trim());
      loginPass.value = '';
      load();
    } catch (err) {
      loginErr.textContent = '❌ เข้าสู่ระบบไม่ได้ — เปิด backend หรือยัง? (' + err.message + ')';
      loginErr.hidden = false;
    }
  }

  function logout() {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
    setStatusMsg('');
    showLogin();
  }

  function cell(text, cls) {
    const td = document.createElement('td');
    td.textContent = (text == null || text === '') ? '—' : text;
    if (cls) td.className = cls;
    return td;
  }

  function actionBtn(label, cls, handler) {
    const b = document.createElement('button');
    b.className = 'mini-btn ' + cls;
    b.textContent = label;
    b.addEventListener('click', handler);
    return b;
  }

  function render(data) {
    document.getElementById('mTotal').textContent = data.total;
    document.getElementById('mPending').textContent = data.counts.pending;
    document.getElementById('mApproved').textContent = data.counts.approved;
    document.getElementById('mRejected').textContent = data.counts.rejected;

    tbody.innerHTML = '';
    const items = data.items || [];
    emptyEl.hidden = items.length > 0;
    items.forEach((it) => {
      const tr = document.createElement('tr');
      tr.appendChild(cell('#' + it.id));
      tr.appendChild(cell(it.dialect_text));
      tr.appendChild(cell(it.central_text));
      tr.appendChild(cell(it.category));
      tr.appendChild(cell([it.region, it.province].filter(Boolean).join(' / ')));

      const tdAudio = document.createElement('td');
      if (it.audio_path) {
        const a = document.createElement('audio');
        a.controls = true;
        a.preload = 'none';
        a.src = API_BASE + '/suggest/audio/' + encodeURIComponent(it.audio_path) + '?token=' + encodeURIComponent(token());
        tdAudio.appendChild(a);
      } else {
        tdAudio.textContent = '—';
      }
      tr.appendChild(tdAudio);

      const tdStatus = document.createElement('td');
      const pill = document.createElement('span');
      pill.className = 'pill ' + it.status;
      pill.textContent = STATUS_LABEL[it.status] || it.status;
      tdStatus.appendChild(pill);
      tr.appendChild(tdStatus);

      tr.appendChild(cell((it.created_at || '').replace('T', ' '), 'time'));

      const tdAct = document.createElement('td');
      const wrap = document.createElement('div');
      wrap.className = 'row-actions';
      if (it.status !== 'approved') wrap.appendChild(actionBtn('✓ อนุมัติ', 'approve', () => setStatus(it.id, 'approved')));
      if (it.status !== 'rejected') wrap.appendChild(actionBtn('✕ ปฏิเสธ', 'reject', () => setStatus(it.id, 'rejected')));
      wrap.appendChild(actionBtn('🗑 ลบ', 'del', () => del(it.id)));
      tdAct.appendChild(wrap);
      tr.appendChild(tdAct);

      tbody.appendChild(tr);
    });
  }

  async function load() {
    setStatusMsg('⏳ กำลังโหลด...');
    try {
      const url = API_BASE + '/suggest/list' + (currentStatus ? ('?status=' + currentStatus) : '');
      const res = await authFetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      showContent();
      render(data);
      csvLink.href = API_BASE + '/suggest/export.csv?token=' + encodeURIComponent(token());
      setStatusMsg('');
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ โหลดไม่ได้ — เปิด backend หรือยัง? (' + err.message + ')');
    }
  }

  async function setStatus(id, status) {
    try {
      const fd = new FormData();
      fd.append('status', status);
      const res = await authFetch(API_BASE + '/suggest/' + id + '/status', { method: 'POST', body: fd });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      load();
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ อัปเดตสถานะไม่ได้ (' + err.message + ')');
    }
  }

  async function del(id) {
    if (!confirm('ลบรายการ #' + id + ' ? (ลบไฟล์เสียงด้วย ถ้ามี)')) return;
    try {
      const res = await authFetch(API_BASE + '/suggest/' + id, { method: 'DELETE' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      load();
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ ลบไม่ได้ (' + err.message + ')');
    }
  }

  document.querySelectorAll('.filter-btn[data-status]').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-status]').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      currentStatus = btn.getAttribute('data-status');
      load();
    });
  });
  document.getElementById('refreshBtn').addEventListener('click', load);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  // เริ่มต้น: เริ่มที่หน้า login เสมอ (ซ่อนปุ่ม logout) แล้วค่อยลองโหลดถ้ามีโทเคน
  // ปุ่ม logout + เนื้อหาจะโผล่ก็ต่อเมื่อโหลดรายการสำเร็จ (token ใช้ได้จริง) เท่านั้น
  showLogin();
  if (token()) load();
})();
</script>
</body>
</html>
