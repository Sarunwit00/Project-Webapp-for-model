<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>แปลงเสียงเป็นข้อความภาษาไทย</title>
<link rel="stylesheet" href="style.css?v=6" />
</head>
<body>
  <div class="container">
    <h1>🎙️ แปลงเสียงภาษาถิ่นเป็นข้อความภาษาไทย</h1>
    
    <!-- Recording Section -->
    <div class="section">
      <h2>1. บันทึกเสียง <span class="badge">Live</span></h2>
      <div class="controls">
        <button id="recordBtn" class="btn btn-record">
          <svg class="mic-icon" viewBox="0 0 24 24"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 1 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
          <span id="recordLabel">เริ่มบันทึก</span>
        </button>
        <span id="recordStatus" class="status">พร้อมบันทึก</span>
      </div>
      <div class="meter-wrap" id="micMeter" hidden>
        <span class="meter-label">🎚️ ระดับเสียงไมค์</span>
        <div class="meter"><div class="meter-fill" id="micMeterFill"></div></div>
      </div>
      <p class="info">กดหยุดบันทึกแล้วระบบจะส่งเสียงให้โมเดลถอดเป็นข้อความให้อัตโนมัติ</p>
      <div class="audio-row" id="recordedRow" hidden>
        <audio id="recordedAudio" controls></audio>
        <button id="deleteRecordingBtn" class="icon-btn" title="ลบไฟล์เสียงที่อัด" aria-label="ลบไฟล์เสียงที่อัด">✕</button>
      </div>
    </div>

    <!-- Upload Section -->
    <div class="section">
      <h2>2. อัปโหลดไฟล์เสียง <span class="badge">File</span></h2>
      <div id="dropzone" class="dropzone">
        <div class="icon">📁</div>
        <p><strong>คลิกเพื่อเลือกไฟล์</strong> หรือ ลากไฟล์มาวาง</p>
        <p style="font-size:13px;">รองรับ .mp3, .wav, .m4a </p>
        <input type="file" id="fileInput" accept="audio/*" />
      </div>
      <div id="fileName" class="file-name"></div>
      <div class="audio-row" id="uploadedRow" hidden>
        <audio id="uploadedAudio" controls></audio>
        <button id="deleteUploadBtn" class="icon-btn" title="ลบไฟล์เสียง" aria-label="ลบไฟล์เสียง">✕</button>
      </div>
      <div class="controls" style="margin-top:12px;" id="transcribeFileWrap" hidden>
        <button id="transcribeFileBtn" class="btn btn-secondary">🤖 ถอดเสียงด้วยโมเดล</button>
      </div>
    </div>

    <!-- Output Section -->
    <div class="section">
      <h2>3. ข้อความภาษาไทยกลาง <span class="badge">Output</span></h2>
      <textarea id="textOutput" class="text-output" placeholder="ข้อความที่ถอดได้จะแสดงที่นี่..." readonly></textarea>
      <div class="controls" style="margin-top:12px;">
        <button id="clearBtn" class="btn btn-clear">🗑️ ล้างข้อความ</button>
      </div>
    </div>
  </div>

<script src="script.js?v=6"></script>
</body>
</html>
