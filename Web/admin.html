<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<title>ผู้ดูแล — คำที่เสนอเข้ามา</title>
<link rel="stylesheet" href="style.css?v=14" />
<style>
  [hidden] { display: none !important; }
  .container { max-width: 1120px; }
  .page-head { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .page-head h1 { font-size:26px; }
  .user-box { display:flex; align-items:center; gap:10px; }
  .user-chip { display:flex; align-items:center; gap:9px; background:var(--surface-soft); border:1px solid var(--border); border-radius:999px; padding:4px 14px 4px 4px; }
  .user-avatar { width:30px; height:30px; border-radius:50%; background:var(--primary); color:#fff; font-weight:700; font-size:14px; display:inline-flex; align-items:center; justify-content:center; text-transform:uppercase; }
  .user-box .uname { font-size:14px; color:var(--heading); font-weight:600; }
  .warn-banner { background:var(--warning-bg); border-left:4px solid var(--warning); padding:11px 15px; border-radius:var(--radius-sm); color:var(--warning); font-size:13px; margin-bottom:18px; }
  .login-panel { max-width:380px; margin:48px auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:30px; box-shadow:var(--shadow-card); }
  .login-panel h2 { margin:0 0 18px; font-size:20px; color:var(--heading); }
  .login-panel input { width:100%; padding:12px 13px; margin-bottom:12px; border:1px solid var(--border-strong); border-radius:var(--radius-sm); font-size:15px; font-family:inherit; color:var(--text); }
  .login-panel input:focus { outline:none; border-color:var(--primary); box-shadow:var(--ring); }
  .login-panel .btn { width:100%; justify-content:center; }
  .login-err { color:var(--danger); font-size:14px; margin:10px 0 0; }
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:22px; }
  .metric { background:var(--surface-soft); border:1px solid var(--border); border-radius:var(--radius-md); padding:16px 18px; }
  .metric .label { font-size:13px; color:var(--text-muted); }
  .metric .value { font-size:28px; font-weight:800; color:var(--heading); margin-top:2px; }
  .metric.total { background:var(--primary-50); border-color:var(--primary-100); }
  .metric.total .value { color:var(--primary-deep); }
  .metric.pending .value { color:var(--warning); }
  .metric.approved .value { color:var(--success); }
  .metric.rejected .value { color:var(--danger); }
  .admin-bar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px; }
  .spacer { margin-left:auto; }
  /* กลุ่มปุ่มกรอง = segmented control (pills ติดกันในกรอบเดียว) */
  .filter-group { display:inline-flex; flex-wrap:wrap; gap:4px; background:var(--surface-softer); border:1px solid var(--border); border-radius:999px; padding:4px; }
  .filter-btn { padding:8px 16px; border-radius:999px; border:none; background:transparent; cursor:pointer; font-family:inherit; font-size:14px; color:var(--text-muted); transition:all .15s ease; white-space:nowrap; }
  .filter-btn:hover { color:var(--primary-hover); background:var(--surface); }
  .filter-btn.active { background:var(--primary); color:#fff; box-shadow:0 2px 6px rgba(99,102,241,.30); }
  /* ปุ่มไอคอนกลม (รีเฟรช) */
  .icon-action { width:40px; height:40px; flex:0 0 auto; border-radius:50%; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); font-size:16px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; transition:all .15s ease; }
  .icon-action:hover { border-color:var(--primary); background:var(--primary-50); color:var(--primary-hover); }
  /* แผงปุ่มแอ็กชัน (ดาวน์โหลด + ล้างข้อมูล) แยกออกจากปุ่มกรอง */
  .action-bar { display:flex; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:18px; padding:12px 14px; background:var(--surface-soft); border:1px solid var(--border); border-radius:var(--radius-md); }
  .action-label { font-size:13px; font-weight:700; color:var(--text-muted); margin-right:2px; }
  /* ปุ่มดาวน์โหลด = ชิปม่วงอ่อน ดูเป็นปุ่มชัด ไม่เหมือนลิงก์ */
  .action-bar .btn-secondary { background:var(--primary-50); border-color:var(--primary-100); color:var(--primary-deep); }
  .action-bar .btn-secondary:hover { background:var(--primary-100); border-color:var(--primary); color:var(--primary-deep); transform:translateY(-1px); }
  .btn-danger { background:var(--danger); color:#fff; border:1px solid var(--danger); }
  .btn-danger:hover { filter:brightness(0.92); transform:translateY(-1px); }
  .table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface); }
  table.admin { width:100%; border-collapse:collapse; font-size:14px; }
  table.admin th, table.admin td { padding:11px 12px; border-bottom:1px solid var(--border); text-align:left; vertical-align:top; }
  table.admin tbody tr:last-child td { border-bottom:none; }
  table.admin tbody tr:hover { background:var(--surface-soft); }
  table.admin th { background:var(--surface-softer); font-weight:700; color:var(--heading); white-space:nowrap; }
  table.admin audio { width:190px; height:34px; }
  .pill { display:inline-block; padding:3px 11px; border-radius:999px; font-size:12px; font-weight:600; white-space:nowrap; }
  .pill.pending { background:var(--warning-bg); color:var(--warning); }
  .pill.approved { background:var(--success-bg); color:var(--success); }
  .pill.rejected { background:var(--danger-bg); color:var(--danger); }
  .row-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .mini-btn { padding:6px 11px; border-radius:8px; border:1px solid var(--border-strong); background:var(--surface); cursor:pointer; font-family:inherit; font-size:13px; transition:all .15s ease; }
  .mini-btn.approve { color:var(--success); border-color:#a9e0c8; }
  .mini-btn.reject { color:var(--warning); border-color:#f0d39a; }
  .mini-btn.del { color:var(--danger); border-color:#f2bcbc; }
  .mini-btn:hover { transform:translateY(-1px); background:var(--surface-soft); }
  .time { white-space:nowrap; color:var(--text-muted); font-size:13px; }
  .empty { text-align:center; color:var(--text-muted); padding:32px; }
</style>
</head>
<body>
  <div class="container">
    <div class="page-head">
      <h1>🛠️ ADMIN </h1>
      <div id="userBox" class="user-box" hidden>
        <div class="user-chip">
          <span class="user-avatar" id="userAvatar">·</span>
          <span class="uname" id="userName"></span>
        </div>
        <button id="logoutBtn" class="btn btn-clear btn-sm">🚪 ออกจากระบบ</button>
      </div>
    </div>

    <div id="loginPanel" class="login-panel" hidden>
      <h2>🔐 เข้าสู่ระบบผู้ดูแล</h2>
      <input id="loginUser" type="text" placeholder="ชื่อผู้ใช้" autocomplete="username" />
      <input id="loginPass" type="password" placeholder="รหัสผ่าน" autocomplete="current-password" />
      <button id="loginBtn" class="btn btn-primary">เข้าสู่ระบบ</button>
      <p id="loginErr" class="login-err" hidden></p>
    </div>

    <div id="adminContent" hidden>
      <div class="warn-banner">⚠️ หน้านี้ลบข้อมูลได้ — อย่าแชร์ชื่อผู้ใช้/รหัสผ่านให้คนอื่น</div>

      <div class="metrics">
        <div class="metric total"><div class="label">ทั้งหมด</div><div class="value" id="mTotal">–</div></div>
        <div class="metric pending"><div class="label">รออนุมัติ</div><div class="value" id="mPending">–</div></div>
        <div class="metric approved"><div class="label">อนุมัติแล้ว</div><div class="value" id="mApproved">–</div></div>
        <div class="metric rejected"><div class="label">ปฏิเสธ</div><div class="value" id="mRejected">–</div></div>
      </div>

      <div class="admin-bar">
        <div class="filter-group" role="group" aria-label="กรองตามสถานะ">
          <button class="filter-btn active" data-status="">ทั้งหมด</button>
          <button class="filter-btn" data-status="pending">รออนุมัติ</button>
          <button class="filter-btn" data-status="approved">อนุมัติแล้ว</button>
          <button class="filter-btn" data-status="rejected">ปฏิเสธ</button>
        </div>
        <button class="icon-action" id="refreshBtn" title="รีเฟรชรายการ" aria-label="รีเฟรชรายการ">🔄</button>
      </div>

      <div class="action-bar">
        <span class="action-label">⬇️ ดาวน์โหลด</span>
        <a class="btn btn-secondary btn-sm" id="csvLink" href="#" title="เฉพาะตาราง CSV ตามตัวกรองที่เลือก">📄 CSV</a>
        <a class="btn btn-secondary btn-sm" id="zipLink" href="#" title="CSV + ไฟล์เสียงทั้งหมด (ตามตัวกรอง)">📦 CSV + เสียง</a>
        <a class="btn btn-secondary btn-sm" id="datasetLink" href="#" title="ZIP พร้อมเทรนใน notebook (train_data.csv + เสียง .wav แยกตามภาค) — เฉพาะที่อนุมัติแล้ว">🎓 Dataset เทรน</a>
        <span class="spacer"></span>
        <button class="btn btn-danger btn-sm" id="resetAllBtn" title="ลบทุกรายการ + ไฟล์เสียงทั้งหมด แล้วรีเซ็ตเลข id ให้เริ่มที่ 1 ใหม่ (ย้อนกลับไม่ได้)">🧨 ล้างทั้งหมด</button>
      </div>

      <div id="status" class="status"></div>

      <div class="table-wrap">
        <table class="admin">
          <thead>
            <tr>
              <th>ประโยคภาษาถิ่น</th><th>คำแปลไทยกลาง</th><th>หมวด</th>
              <th>ภาค/จังหวัด</th><th>เสียง</th><th>สถานะ</th><th>เวลา</th><th>จัดการ</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div id="empty" class="empty" hidden>— ยังไม่มีรายการ —</div>
    </div>
  </div>

<script>
(function () {
  const API_BASE = (location.protocol === 'file:' || location.port === '5500') ? 'http://127.0.0.1:8000' : '';
  let currentStatus = '';

  const loginPanel = document.getElementById('loginPanel');
  const adminContent = document.getElementById('adminContent');
  const loginUser = document.getElementById('loginUser');
  const loginPass = document.getElementById('loginPass');
  const loginErr = document.getElementById('loginErr');
  const tbody = document.getElementById('tbody');
  const emptyEl = document.getElementById('empty');
  const statusEl = document.getElementById('status');
  const csvLink = document.getElementById('csvLink');
  const zipLink = document.getElementById('zipLink');
  const datasetLink = document.getElementById('datasetLink');
  const userBox = document.getElementById('userBox');
  const userName = document.getElementById('userName');

  const STATUS_LABEL = { pending: 'รออนุมัติ', approved: 'อนุมัติแล้ว', rejected: 'ปฏิเสธ' };

  function setStatusMsg(m) { statusEl.textContent = m || ''; }
  function token() { return localStorage.getItem('adminToken') || ''; }
  function showLogin() { loginPanel.hidden = false; adminContent.hidden = true; userBox.hidden = true; }
  function showContent() {
    loginPanel.hidden = true;
    adminContent.hidden = false;
    userBox.hidden = false;
    const u = (localStorage.getItem('adminUser') || '').trim();
    userName.textContent = u || '—';
    document.getElementById('userAvatar').textContent = u ? u[0] : '·';
  }

  async function authFetch(url, opts) {
    opts = opts || {};
    opts.headers = Object.assign({}, opts.headers || {}, { 'X-Admin-Token': token() });
    const res = await fetch(url, opts);
    if (res.status === 401) {
      localStorage.removeItem('adminToken');
      showLogin();
      throw new Error('unauthorized');
    }
    return res;
  }

  async function doLogin() {
    loginErr.hidden = true;
    const fd = new FormData();
    fd.append('username', loginUser.value.trim());
    fd.append('password', loginPass.value);
    try {
      const res = await fetch(API_BASE + '/admin/login', { method: 'POST', body: fd });
      if (res.status === 401) {
        loginErr.textContent = '❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
        loginErr.hidden = false;
        return;
      }
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      localStorage.setItem('adminToken', data.token);
      localStorage.setItem('adminUser', loginUser.value.trim());
      loginPass.value = '';
      load();
    } catch (err) {
      loginErr.textContent = '❌ เข้าสู่ระบบไม่ได้ — เปิด backend หรือยัง? (' + err.message + ')';
      loginErr.hidden = false;
    }
  }

  function logout() {
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
    setStatusMsg('');
    showLogin();
  }

  function cell(text, cls) {
    const td = document.createElement('td');
    td.textContent = (text == null || text === '') ? '—' : text;
    if (cls) td.className = cls;
    return td;
  }

  function actionBtn(label, cls, handler) {
    const b = document.createElement('button');
    b.className = 'mini-btn ' + cls;
    b.textContent = label;
    b.addEventListener('click', handler);
    return b;
  }

  function render(data) {
    document.getElementById('mTotal').textContent = data.total;
    document.getElementById('mPending').textContent = data.counts.pending;
    document.getElementById('mApproved').textContent = data.counts.approved;
    document.getElementById('mRejected').textContent = data.counts.rejected;

    tbody.innerHTML = '';
    const items = data.items || [];
    emptyEl.hidden = items.length > 0;
    items.forEach((it) => {
      const tr = document.createElement('tr');
      tr.appendChild(cell(it.dialect_text));
      tr.appendChild(cell(it.central_text));
      tr.appendChild(cell(it.category));
      tr.appendChild(cell([it.region, it.province].filter(Boolean).join(' / ')));

      const tdAudio = document.createElement('td');
      if (it.audio_path) {
        const a = document.createElement('audio');
        a.controls = true;
        a.preload = 'none';
        a.src = API_BASE + '/suggest/audio/' + encodeURIComponent(it.audio_path) + '?token=' + encodeURIComponent(token());
        tdAudio.appendChild(a);
      } else {
        tdAudio.textContent = '—';
      }
      tr.appendChild(tdAudio);

      const tdStatus = document.createElement('td');
      const pill = document.createElement('span');
      pill.className = 'pill ' + it.status;
      pill.textContent = STATUS_LABEL[it.status] || it.status;
      tdStatus.appendChild(pill);
      tr.appendChild(tdStatus);

      tr.appendChild(cell((it.created_at || '').replace('T', ' '), 'time'));

      const tdAct = document.createElement('td');
      const wrap = document.createElement('div');
      wrap.className = 'row-actions';
      if (it.status !== 'approved') wrap.appendChild(actionBtn('✓ อนุมัติ', 'approve', () => setStatus(it.id, 'approved')));
      if (it.status !== 'rejected') wrap.appendChild(actionBtn('✕ ปฏิเสธ', 'reject', () => setStatus(it.id, 'rejected')));
      wrap.appendChild(actionBtn('🗑 ลบ', 'del', () => del(it.id)));
      tdAct.appendChild(wrap);
      tr.appendChild(tdAct);

      tbody.appendChild(tr);
    });
  }

  async function load() {
    setStatusMsg('⏳ กำลังโหลด...');
    try {
      const url = API_BASE + '/suggest/list' + (currentStatus ? ('?status=' + currentStatus) : '');
      const res = await authFetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      showContent();
      render(data);
      // ลิงก์ดาวน์โหลดทำตามตัวกรองที่เลือกอยู่ (ว่าง = ทั้งหมด)
      const statusQS = currentStatus ? ('&status=' + encodeURIComponent(currentStatus)) : '';
      csvLink.href = API_BASE + '/suggest/export.csv?token=' + encodeURIComponent(token()) + statusQS;
      zipLink.href = API_BASE + '/suggest/export.zip?token=' + encodeURIComponent(token()) + statusQS;
      // Dataset เทรน = เฉพาะที่อนุมัติแล้วเสมอ ไม่ผูกกับตัวกรองที่เลือก
      datasetLink.href = API_BASE + '/suggest/export_dataset.zip?token=' + encodeURIComponent(token());
      setStatusMsg('');
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ โหลดไม่ได้ — เปิด backend หรือยัง? (' + err.message + ')');
    }
  }

  async function setStatus(id, status) {
    try {
      const fd = new FormData();
      fd.append('status', status);
      const res = await authFetch(API_BASE + '/suggest/' + id + '/status', { method: 'POST', body: fd });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      load();
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ อัปเดตสถานะไม่ได้ (' + err.message + ')');
    }
  }

  async function del(id) {
    if (!confirm('ลบรายการ #' + id + ' ? (ลบไฟล์เสียงด้วย ถ้ามี)')) return;
    try {
      const res = await authFetch(API_BASE + '/suggest/' + id, { method: 'DELETE' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      load();
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ ลบไม่ได้ (' + err.message + ')');
    }
  }

  async function resetAll() {
    // ลบทั้งหมด = ย้อนกลับไม่ได้ จึงยืนยันสองชั้น (ชั้นสองให้พิมพ์คำว่า ล้าง)
    if (!confirm('⚠️ ลบทุกรายการ + ไฟล์เสียงทั้งหมด แล้วรีเซ็ตเลข id ให้เริ่มที่ 1 ใหม่?\nการกระทำนี้ย้อนกลับไม่ได้')) return;
    if (prompt('ยืนยันอีกครั้ง — พิมพ์คำว่า  ล้าง  แล้วกดตกลง') !== 'ล้าง') {
      setStatusMsg('ยกเลิกการล้างข้อมูลแล้ว');
      return;
    }
    try {
      const res = await authFetch(API_BASE + '/suggest/reset_all', { method: 'POST' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      currentStatus = '';
      document.querySelectorAll('.filter-btn[data-status]').forEach((b) =>
        b.classList.toggle('active', b.getAttribute('data-status') === ''));
      await load();
      setStatusMsg('🧹 ล้างข้อมูลทั้งหมดแล้ว (ลบ ' + data.deleted_rows + ' รายการ, '
        + data.deleted_audio + ' ไฟล์เสียง) — รายการถัดไปจะเริ่มที่ id 1');
    } catch (err) {
      if (err.message === 'unauthorized') return;
      setStatusMsg('❌ ล้างข้อมูลไม่ได้ (' + err.message + ')');
    }
  }

  document.querySelectorAll('.filter-btn[data-status]').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-status]').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      currentStatus = btn.getAttribute('data-status');
      load();
    });
  });
  document.getElementById('refreshBtn').addEventListener('click', load);
  document.getElementById('resetAllBtn').addEventListener('click', resetAll);
  document.getElementById('logoutBtn').addEventListener('click', logout);
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  loginPass.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });

  // ออกจากระบบเมื่อ "ออกจากหน้านี้จริง ๆ" — กดย้อนกลับ/เดินหน้าของเบราว์เซอร์ ไปหน้าอื่น หรือปิดแท็บ
  // แต่ "การรีโหลดหน้าเดิม (F5)" ต้องยังอยู่ในระบบ จึงพักโทเคนไว้ใน sessionStorage ชั่วคราวก่อน
  // แล้วค่อยกู้คืนถ้าโหลดรอบใหม่เป็นการรีโหลด (ดูบล็อก restoreOnReload ด้านล่าง)
  // (การดาวน์โหลด CSV เป็นไฟล์แนบ ไม่นับเป็นการออกจากหน้า จึงไม่ล็อกเอาต์)
  window.addEventListener('pagehide', () => {
    const t = localStorage.getItem('adminToken');
    if (t) {
      sessionStorage.setItem('adminTokenTmp', t);
      const u = localStorage.getItem('adminUser');
      if (u) sessionStorage.setItem('adminUserTmp', u);
    }
    localStorage.removeItem('adminToken');
    localStorage.removeItem('adminUser');
  });
  // ถ้าเบราว์เซอร์คืนหน้านี้จาก bfcache (กดเดินหน้ากลับเข้ามา) โทเคนถูกล้างไปแล้ว → ทิ้งของชั่วคราว + บังคับหน้า login
  window.addEventListener('pageshow', (e) => {
    if (e.persisted && !token()) {
      sessionStorage.removeItem('adminTokenTmp');
      sessionStorage.removeItem('adminUserTmp');
      showLogin();
    }
  });

  // กู้โทเคนคืนเฉพาะเมื่อรอบโหลดนี้เป็น "การรีโหลด" หน้าเดิม (F5) เท่านั้น
  // กรณีอื่น (เปิดใหม่ / กดย้อนกลับ-เดินหน้า) ให้ทิ้งโทเคนชั่วคราว → บังคับให้ล็อกอินใหม่
  (function restoreOnReload() {
    const nav = performance.getEntriesByType('navigation')[0];
    const isReload = nav ? nav.type === 'reload'
                         : (performance.navigation && performance.navigation.type === 1);
    const t = sessionStorage.getItem('adminTokenTmp');
    if (isReload && t) {
      localStorage.setItem('adminToken', t);
      const u = sessionStorage.getItem('adminUserTmp');
      if (u) localStorage.setItem('adminUser', u);
    }
    sessionStorage.removeItem('adminTokenTmp');
    sessionStorage.removeItem('adminUserTmp');
  })();

  // เริ่มต้น: เริ่มที่หน้า login เสมอ (ซ่อนปุ่ม logout) แล้วค่อยลองโหลดถ้ามีโทเคน
  // ปุ่ม logout + เนื้อหาจะโผล่ก็ต่อเมื่อโหลดรายการสำเร็จ (token ใช้ได้จริง) เท่านั้น
  showLogin();
  if (token()) load();
})();
</script>
</body>
</html>
